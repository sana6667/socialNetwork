name: Debug Monitoring
on:
  workflow_dispatch:
    inputs:
      Runner_Id:
        type: string
        description: "Run ID from infra apply"
        required: true

permissions:
  id-token: write
  contents: read
  actions: read

env:
  TF_WORKING_DIR: Terraform/module
  AWS_REGION: ${{ secrets.AWS_REGION }}
  K8S_OUT_DIR: k8s/out
  K8S_TPL_DIR: k8s/templates

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: infra-prod-tf
          path: ${{ env.TF_WORKING_DIR }}
          run-id: ${{ inputs.Runner_Id }}
          github-token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Get outputs
        id: out
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw eks_cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ steps.out.outputs.CLUSTER_NAME }}"

      # =========================================================
      # ===============  DEBUG BLOCK START  ======================
      # =========================================================

      - name: 📌 Show namespaces
        run: kubectl get ns || true

      - name: 📌 Show monitoring pods
        run: kubectl get pods -n monitoring -o wide || true

      - name: 📌 Show deployments in monitoring
        run: kubectl get deploy -n monitoring -o wide || true

      - name: 📌 Show statefulsets (Prometheus / Alertmanager)
        run: kubectl get statefulset -n monitoring -o wide || true

      - name: 📌 Show PVC
        run: kubectl get pvc -n monitoring || true

      - name: 📌 Describe problematic pods
        run: |
          kubectl describe pods -n monitoring || true

      - name: 📌 Logs Prometheus
        run: |
          kubectl logs -n monitoring --tail=200 \
            statefulset/monitoring-kube-prometheus-stack-prometheus 2>/dev/null || true

      - name: 📌 Logs Grafana
        run: |
          kubectl logs -n monitoring deploy/monitoring-grafana 2>/dev/null || true

      - name: 📌 Events in monitoring namespace
        run: kubectl get events -n monitoring --sort-by=.metadata.creationTimestamp || true

      - name: 📌 Check CRDs
        run: kubectl get crd | grep -E 'promethe|monitor|alert' || true

      - name: 📌 Helm releases
        run: helm list -A || true

      - name: Info grafana
        run : kubectl -n monitoring get svc

      # =========================================================
      # ===============  DEBUG BLOCK END  ========================
      # =========================================================