name: Debug ALB
on:
  workflow_dispatch:
    inputs:
      Runner_Id:
        type: string
        description: "Run ID from infra apply"
        required: true

permissions:
  id-token: write
  contents: read
  actions: read

env:
  TF_WORKING_DIR: Terraform/module
  AWS_REGION: ${{ secrets.AWS_REGION }}
  K8S_OUT_DIR: k8s/out
  K8S_TPL_DIR: k8s/templates

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: infra-prod-tf
          path: ${{ env.TF_WORKING_DIR }}
          run-id: ${{ inputs.Runner_Id }}
          github-token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
    
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: 1.14.4
      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Get outputs
        id: out
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw eks_cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ steps.out.outputs.CLUSTER_NAME }}"

      # ========== ГЛАВНОЕ ==========

      - name: Show ingress
        run: kubectl get ingress -A
      - name: Info endpoints
        run: | 
          kubectl -n default get endpoints backend-service -o wide
          kubectl -n default describe endpoints backend-service
      - name: Pod status
        run: | 
          kubectl -n default get pods -l app=backend -o wide
          kubectl -n default describe pod -l app=backend

      - name: Describe ingress backend
        run: kubectl describe ingress backend -n default

      - name: ALB controller logs
        run: kubectl logs -n kube-system deployment/aws-load-balancer-controller | tail -n 200

      - name: Show services
        run: kubectl get svc -n default -o wide

      - name: Helm repos and releases
        run: |
          set -euo pipefail
          helm repo list
          helm list -A
          kubectl -n kube-system get deploy,pods | grep -i alb || true
          kubectl -n monitoring get deploy,sts,pods,svc 2>/dev/null || true

      - name: Show generated manifests (head)
        run: |
          set -euo pipefail
          ls -la "${{ env.K8S_OUT_DIR }}"
          for f in secret-mssql.yaml job-ef.yaml deployment.yaml service.yaml ingress.yaml; do
            echo "===== $f ====="
            sed -n '1,60p' "${{ env.K8S_OUT_DIR }}/$f" || true
            echo
          done
      - name: Check Secret mssql-conn
        run: |
          set -euo pipefail
          kubectl get secret mssql-conn -n default -o yaml | sed -n '1,80p'

      - name: Check CRDs and namespaces
        run: |
          set -euo pipefail
          kubectl get ns
          kubectl get crd | egrep 'servicemonitors|prometheuses|alertmanagers|targetgroupbindings' || true
      - name: Check ALB Controller SA & IAM role annotation
        run: |
          set -euo pipefail
          kubectl -n kube-system get sa aws-load-balancer-controller -o yaml | sed -n '1,120p'