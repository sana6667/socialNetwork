name: Redeploy Monitoring (Grafana)

on:
  workflow_dispatch:
  push:
    paths:
      - "k8s/monitoring/**"
      - "k8s/monitoring/grafana-ingress.yaml"


jobs:
  redeploy-monitoring:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
          aws-region: us-east-1

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name priv-cluster-eks \
            --region us-east-1

      - name: Verify kubectl access
        run: |
          kubectl get nodes
          kubectl get ns

      - name: Apply Grafana ingress
        run: |
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Apply additional monitoring manifests
        run: |
          kubectl apply -f k8s/monitoring/

      - name: Backend diagnostics
        run: |
          echo "===== BACKEND PODS ====="
          kubectl -n default get pods -o wide

          echo "===== BACKEND DEPLOYMENTS ====="
          kubectl -n default get deploy -o wide

          echo "===== BACKEND SERVICES ====="
          kubectl -n default get svc -o wide

          echo "===== BACKEND POD DESCRIPTIONS ====="
          for pod in $(kubectl -n default get pod -l app=backend -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- DESCRIBE $pod ---"
            kubectl -n default describe pod $pod
          done

          echo "===== BACKEND LOGS ====="
          for pod in $(kubectl -n default get pod -l app=backend -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- LOGS $pod ---"
            kubectl -n default logs $pod --tail=200
          done