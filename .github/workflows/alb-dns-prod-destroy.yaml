name: Terraform alb dns destroy
on:
    workflow_dispatch:
        inputs:
            Runner_Id:
                type: string
                description: "Enter runner id"
                required: true

permissions:
    id-token: write
    contents: read
    actions: read

jobs:
    dns-destroy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Terraform setup
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: 1.14.4
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                name: alb-dns-tf
                path: Terraform/module/load-balancer
                run-id: ${{ inputs.Runner_Id }}
                github-token: ${{ github.token }}
            - name: Aws credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
                aws-region: ${{ secrets.AWS_REGION }}
            - name: Terraform init
              working-directory: Terraform/module/load-balancer
              run: terraform init
            - name: Terraform destroy
              working-directory: Terraform/module/load-balancer
              run: terraform destroy -auto-approve
