name: Alb controller install

on:
    workflow_dispatch:

permissions:
    id-token: write
    contents: read
    actions: read

env:
    TF_WORKING_DIR: Terraform/prod


jobs:
    alb_controller:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              
            - name: Terraform install
              uses: hashicorp/setup-terraform@v3
              with:
                version-terraform: 1.14.4
            - name: Aws credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
                aws-region: ${{ secrets.AWS_REGION }}
            - name: Terraform init
              working-directory: ${{ env.TF_WORKING_DIR }}
              run: terraform init

            - name: Terraform outputs
              id: tf_outputs
              working-directory: ${{ env.TF_WORKING_DIR }}
              run: |
                CLUSTER_NAME=$(terraform output -raw eks_cluster_name)
                VPC_ID=$(terraform output -raw vpc_id)
                echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
                echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
            - name: AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE }}
                aws-region: ${{ secrets.AWS_REGION }}
            - name: update kubeconfig
              run: aws eks update-kubeconfig --region "${{ secrets.AWS_REGION }}" --name "${{ steps.tf_outputs.outputs.cluster_name }}"
            - name: helm repo
              run: |
                helm repo add eks https://aws.github.io/eks-charts
                helm repo update
            - name: alb service account
              working-directory: k8s/alb-controller
              run: kubectl apply -f aws-load-balancer-controller-sa.yaml
            - name: Install aws alb controller
              run: |
                helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
                --namespace kube-system \
                --set clusterName="${{ steps.tf_outputs.outputs.cluster_name }}" \
                --set region="${{ secrets.AWS_REGION }}" \
                --set vpcId="${{ steps.tf_outputs.outputs.vpc_id}}" \
                --set serviceAccount.create=false \
                --set serviceAccount.name=aws-load-balancer-controller


