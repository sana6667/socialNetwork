name: Terraform ECR destroy
on:
    workflow_dispatch:
      inputs:
        Runner_Id:
          type: string
          description: "Enter runner id"
          required: true

permissions:
    id-token: write
    contents: read
    actions: read

jobs:
    ecr-destroy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                name: ecr-tfstate
                path: Terraform/module/stage/ecr-test
                run-id: ${{ inputs.Runner_Id }}
                github-token: ${{ github.token }}
            - name: Terraform setup
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: 1.14.4
            - name: Aws credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::336670698191:role/github-terraform-role
                aws-region: us-east-1
            - name: Terraform init
              working-directory: Terraform/module/stage/ecr-test
              run: terraform init
            - name: Terraform destroy
              working-directory: Terraform/module/stage/ecr-test
              run: terraform destroy -auto-approve
